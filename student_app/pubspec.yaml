name: student_app
description: MPNMJEC Student App - Real-time Bus Tracking for Students and Staff
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.6.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  http: ^1.2.1
  intl: ^0.19.0
  web_socket_channel: ^3.0.1
  geolocator: ^11.0.0
  lucide_icons: ^0.257.0
  shared_preferences: ^2.2.3
  flutter_spinkit: ^5.2.1
  cupertino_icons: ^1.0.6
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/audio/bus_alarm.wav
