# Render.com Deployment Configuration for Tracking Server
services:
  - type: web
    name: mpnmjec-tracking-server
    env: node
    buildCommand: npm install
    startCommand: node index.js
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: 3001
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://your-admin-panel.vercel.app
      - key: NODE_ENV
        value: production
